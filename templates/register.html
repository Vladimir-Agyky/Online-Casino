{% extends "base.html" %}

{% block title %}Register - Nova Felt Casino{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <div class="section-kicker">10,000 starting chips</div>
        <h1>Create Account</h1>
        <form method="post" class="stacked-form">
            <label>
                Username
                <input name="username" autocomplete="username" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" autocomplete="new-password" required>
            </label>
            <button class="button primary" type="submit">Create Player</button>
        </form>
        <p class="muted-line">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
    </div>
    <div class="chip-stack-art">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
</section>
{% endblock %}
